[[package]]
name = "cmake"
version = "3.22.1"
description = "CMake is an open-source, cross-platform family of tools designed to build, test and package software"
category = "dev"
optional = false
python-versions = "*"

[package.extras]
test = ["codecov (>=2.0.5)", "coverage (>=4.2)", "flake8 (>=3.0.4)", "path.py (>=11.5.0)", "pytest (>=3.0.3)", "pytest-cov (>=2.4.0)", "pytest-runner (>=2.9)", "pytest-virtualenv (>=1.7.0)", "scikit-build (>=0.10.0)", "setuptools (>=28.0.0)", "virtualenv (>=15.0.3)", "wheel"]

[[package]]
name = "distro"
version = "1.6.0"
description = "Distro - an OS platform information API"
category = "dev"
optional = false
python-versions = "*"

[[package]]
name = "numpy"
version = "1.22.1"
description = "NumPy is the fundamental package for array computing with Python."
category = "main"
optional = false
python-versions = ">=3.8"

[[package]]
name = "packaging"
version = "21.3"
description = "Core utilities for Python packages"
category = "dev"
optional = false
python-versions = ">=3.6"

[package.dependencies]
pyparsing = ">=2.0.2,<3.0.5 || >3.0.5"

[[package]]
name = "pybind11"
version = "2.9.0"
description = "Seamless operability between C++11 and Python"
category = "dev"
optional = false
python-versions = "!=3.0,!=3.1,!=3.2,!=3.3,!=3.4,>=2.7"

[package.extras]
global = ["pybind11-global (==2.9.0)"]

[[package]]
name = "pyparsing"
version = "3.0.6"
description = "Python parsing module"
category = "dev"
optional = false
python-versions = ">=3.6"

[package.extras]
diagrams = ["jinja2", "railroad-diagrams"]

[[package]]
name = "scikit-build"
version = "0.12.0"
description = "Improved build system generator for Python C/C++/Fortran/Cython extensions"
category = "dev"
optional = false
python-versions = "*"

[package.dependencies]
distro = "*"
packaging = "*"

[package.extras]
test = ["codecov (>=2.0.5)", "coverage (>=4.2)", "cython (>=0.25.1)", "flake8 (>=3.0.4)", "path.py (>=11.5.0)", "pytest (>=4.5.0)", "pytest-cov (>=2.7.1)", "pytest-mock (>=1.10.4)", "pytest-runner (>=5.1)", "pytest-virtualenv (>=1.2.5)", "requests", "six (>=1.10.0)", "virtualenv", "pathlib2"]

